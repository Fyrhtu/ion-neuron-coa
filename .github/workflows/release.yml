name: Package and release

# Publish a GitHub release zip when a version tag is pushed (e.g. v1.4.18-CoA).
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Clone project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package and release to GitHub
        uses: BigWigsMods/packager@v2
        with:
          args: '-p github'